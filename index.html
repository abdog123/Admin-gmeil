<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - B Gmail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            padding: 20px;
            direction: rtl;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .admin-header h1 {
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header h1::before {
            content: "👑";
            font-size: 32px;
        }

        .refresh-all {
            background: linear-gradient(135deg, #1a73e8, #0d5bba);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #1a73e8;
        }

        .stat-label {
            color: #555;
            font-size: 13px;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1a73e8, #0d5bba);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header h2 {
            color: #1a73e8;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-refresh:hover {
            background: #0d5bba;
            transform: scale(1.02);
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px 10px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        tr:hover {
            background: #eef2ff;
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-pending {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .status-approved {
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: white;
        }

        .status-rejected {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .status-completed {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: white;
        }

        /* Buttons */
        .btn-approve {
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 2px;
        }

        .btn-reject {
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 2px;
        }

        .btn-block {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 2px;
        }

        .btn-unblock {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Admin Controls */
        .admin-controls {
            background: #f8fafc;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .admin-controls .form-group {
            flex: 1;
            min-width: 160px;
        }

        .admin-controls label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        .admin-controls input,
        .admin-controls select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Images */
        .gmail-image {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #ddd;
        }

        .gmail-image:hover {
            transform: scale(1.1);
            border-color: #1a73e8;
        }

        /* Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .image-modal-content {
            background: white;
            border-radius: 20px;
            padding: 16px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }

        .image-modal-content img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Tab content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* No data */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Status text */
        .status-active {
            color: #28a745;
            font-weight: bold;
        }

        .status-blocked {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
        <h1>لوحة تحكم الأدمن</h1>
        <button class="refresh-all" onclick="refreshAllData()">🔄 تحديث الكل</button>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsContainer">
        <div class="stat-card">
            <div class="stat-icon">📧</div>
            <div class="stat-value" id="totalGmails">0</div>
            <div class="stat-label">إجمالي طلبات Gmail</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-value" id="pendingGmails">0</div>
            <div class="stat-label">قيد المراجعة</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="totalWithdrawals">0</div>
            <div class="stat-label">طلبات السحب</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">إجمالي المستخدمين</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('gmails')">📧 طلبات Gmail</button>
        <button class="tab-btn" onclick="showTab('withdrawals')">💰 طلبات السحب</button>
        <button class="tab-btn" onclick="showTab('users')">👥 إدارة المستخدمين</button>
        <button class="tab-btn" onclick="showTab('balance')">💰 تعديل الرصيد</button>
    </div>

    <!-- Gmails Tab -->
    <div id="gmailsTab" class="tab-content active">
        <div class="card">
            <div class="card-header">
                <h2>📧 طلبات إنشاء Gmail</h2>
                <button class="btn-refresh" onclick="loadAllGmails()">🔄 تحديث</button>
            </div>
            <div id="gmailsTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- Withdrawals Tab -->
    <div id="withdrawalsTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2>💰 طلبات السحب</h2>
                <button class="btn-refresh" onclick="loadAllWithdrawals()">🔄 تحديث</button>
            </div>
            <div id="withdrawalsTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- Users Tab -->
    <div id="usersTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2>👥 إدارة المستخدمين</h2>
                <button class="btn-refresh" onclick="loadAllUsers()">🔄 تحديث</button>
            </div>
            <div id="usersTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- Balance Tab -->
    <div id="balanceTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2>💰 تعديل الرصيد</h2>
            </div>
            <div class="admin-controls">
                <div class="form-group">
                    <label>📱 رقم الهاتف:</label>
                    <input type="tel" id="balancePhone" placeholder="مثال: 01012345678">
                </div>
                <div class="form-group">
                    <label>💰 نوع الرصيد:</label>
                    <select id="balanceType">
                        <option value="current">الرصيد الحالي</option>
                        <option value="pending">الرصيد المتجمد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💵 المبلغ:</label>
                    <input type="number" id="balanceAmount" placeholder="المبلغ">
                </div>
                <div class="form-group">
                    <label>🔄 العملية:</label>
                    <select id="balanceOperation">
                        <option value="add">➕ إضافة</option>
                        <option value="subtract">➖ خصم</option>
                        <option value="set">⚙️ تعيين</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="modifyBalance()">تعديل الرصيد</button>
            </div>
            <button class="btn-refresh" onclick="loadAllUsers()">🔄 تحديث قائمة المستخدمين</button>
            <div id="usersBalanceTable" class="table-wrapper">
                <div class="loading">⏳ اضغط على زر التحديث لعرض المستخدمين</div>
            </div>
        </div>
    </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <div class="image-modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <img id="modalImage" src="" alt="صورة الجميل">
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhqm0X3ZotU1CTxYyPDWgESbQPJuCvcs4MkGjgyPNXB4M7pUot_L1DsIk6bAF8lQHv/exec';

    let gmailsData = [];
    let withdrawalsData = [];
    let usersData = [];

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        event.target.classList.add('active');
    }

    async function callAPI(action, params = {}) {
        try {
            const url = new URL(SCRIPT_URL);
            url.searchParams.append('action', action);
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
            const response = await fetch(url.toString());
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: error.message };
        }
    }

    async function refreshAllData() {
        await loadAllGmails();
        await loadAllWithdrawals();
        await loadAllUsers();
        updateStats();
    }

    function updateStats() {
        document.getElementById('totalGmails').textContent = gmailsData.length || 0;
        document.getElementById('pendingGmails').textContent = gmailsData.filter(g => g.status === 'Pending').length || 0;
        document.getElementById('totalWithdrawals').textContent = withdrawalsData.filter(w => w.status === 'Pending').length || 0;
        document.getElementById('totalUsers').textContent = usersData.length || 0;
    }

    async function loadAllGmails() {
        const container = document.getElementById('gmailsTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

        const result = await callAPI('adminGetAllGmails');

        if (result?.success && result.gmails) {
            gmailsData = result.gmails;
            if (gmailsData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا توجد طلبات إنشاء Gmail</div>';
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📷 الصورة</th>
                        <th>📱 رقم الهاتف</th>
                        <th>👤 الاسم</th>
                        <th>📧 البريد</th>
                        <th>🔑 كلمة المرور</th>
                        <th>📅 التاريخ</th>
                        <th>📌 الحالة</th>
                        <th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;

            gmailsData.forEach((g, idx) => {
                const statusClass = g.status === 'Pending' ? 'status-pending' : (g.status === 'Approved' ? 'status-approved' : 'status-rejected');
                const statusText = g.status === 'Pending' ? '⏳ قيد المراجعة' : (g.status === 'Approved' ? '✅ مقبول' : '❌ مرفوض');

                let imgHtml = '📷 لا توجد';
                if (g.imageUrl && g.imageUrl.startsWith('http')) {
                    imgHtml = `<img src="${g.imageUrl}" class="gmail-image" onclick="showImage('${g.imageUrl}')" onerror="this.style.display='none';this.nextSibling.style.display='inline'"><span style="display:none">خطأ</span>`;
                }

                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${imgHtml}</td>
                    <td>${g.phone}</td>
                    <td>${g.fullName}</td>
                    <td>${g.gmail}</td>
                    <td>${g.password}</td>
                    <td>${new Date(g.timestamp).toLocaleDateString('ar-EG')}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        ${g.status === 'Pending' ? `
                            <button class="btn-approve" onclick="approveGmail(${g.rowIndex})">✅ قبول</button>
                            <button class="btn-reject" onclick="rejectGmail(${g.rowIndex}, false)">❌ رفض</button>
                            <button class="btn-block" onclick="rejectGmail(${g.rowIndex}, true)">🚫 رفض وحظر</button>
                        ` : ''}
                    </td>
                </tr>`;
            });
            html += `</tbody>点心`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ في تحميل البيانات</div>';
        }
        updateStats();
    }

    async function loadAllWithdrawals() {
        const container = document.getElementById('withdrawalsTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

        const result = await callAPI('adminGetAllWithdrawals');

        if (result?.success && result.withdrawals) {
            withdrawalsData = result.withdrawals;
            if (withdrawalsData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا توجد طلبات سحب</div>';
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📱 رقم الهاتف</th>
                        <th>🏦 المحفظة</th>
                        <th>💰 المبلغ</th>
                        <th>💸 المصاريف</th>
                        <th>✅ الصافي</th>
                        <th>📅 التاريخ</th>
                        <th>📌 الحالة</th>
                        <th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;

            withdrawalsData.forEach((w, idx) => {
                const statusClass = w.status === 'Pending' ? 'status-pending' : (w.status === 'Completed' ? 'status-completed' : 'status-rejected');
                const statusText = w.status === 'Pending' ? '⏳ قيد المراجعة' : (w.status === 'Completed' ? '✅ مكتمل' : '❌ مرفوض');
                const netAmount = w.amount - (w.fee || 5);

                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${w.phone}</td>
                    <td>${w.wallet}</td>
                    <td>${w.amount} ج.م</td>
                    <td>${w.fee || 5} ج.م</td>
                    <td>${netAmount} ج.م</td>
                    <td>${new Date(w.timestamp).toLocaleDateString('ar-EG')}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        ${w.status === 'Pending' ? `
                            <button class="btn-approve" onclick="approveWithdrawal(${w.rowIndex})">✅ قبول</button>
                            <button class="btn-reject" onclick="rejectWithdrawal(${w.rowIndex})">❌ رفض</button>
                        ` : ''}
                    </td>
                </td>`;
            });
            html += `</tbody>点心`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ في تحميل البيانات</div>';
        }
        updateStats();
    }

    async function loadAllUsers() {
        const container = document.getElementById('usersTable');
        const balanceContainer = document.getElementById('usersBalanceTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
        balanceContainer.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

        const result = await callAPI('adminGetAllUsers');

        if (result?.success && result.users) {
            usersData = result.users;
            if (usersData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا يوجد مستخدمين</div>';
                balanceContainer.innerHTML = '<div class="no-data">📭 لا يوجد مستخدمين</div>';
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📱 رقم الهاتف</th>
                        <th>👤 الاسم</th>
                        <th>💰 الرصيد الحالي</th>
                        <th>⏳ الرصيد المتجمد</th>
                        <th>📌 الحالة</th>
                        <th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;

            let balanceHtml = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📱 رقم الهاتف</th>
                        <th>👤 الاسم</th>
                        <th>💰 الرصيد الحالي</th>
                        <th>⏳ الرصيد المتجمد</th>
                        <th>📌 الحالة</th>
                    </tr>
                </thead>
                <tbody>`;

            usersData.forEach((u, idx) => {
                const statusText = u.blocked === "TRUE" ? '🔴 محظور' : '🟢 نشط';
                const statusClass = u.blocked === "TRUE" ? 'status-blocked' : 'status-active';

                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${u.phone}</td>
                    <td>${u.name}</td>
                    <td>${u.balance} ج.م</td>
                    <td>${u.pendingBalance} ج.م</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td>
                        ${u.blocked === "TRUE" ?
                            `<button class="btn-unblock" onclick="unblockUser('${u.phone}')">🔓 إلغاء الحظر</button>` :
                            `<button class="btn-block" onclick="blockUser('${u.phone}')">🔒 حظر</button>`
                        }
                    </td>
                </tr>`;

                balanceHtml += `<tr>
                    <td>${idx + 1}</td>
                    <td>${u.phone}</td>
                    <td>${u.name}</td>
                    <td>${u.balance} ج.م</td>
                    <td>${u.pendingBalance} ج.م</td>
                    <td class="${statusClass}">${statusText}</td>
                </tr>`;
            });
            html += `</tbody>点心`;
            balanceHtml += `</tbody>点心`;
            container.innerHTML = html;
            balanceContainer.innerHTML = balanceHtml;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ</div>';
            balanceContainer.innerHTML = '<div class="no-data">❌ حدث خطأ</div>';
        }
        updateStats();
    }

    async function approveGmail(rowIndex) {
        if (!confirm('✅ قبول هذا الجميل؟ سيتم تحويل المبلغ للرصيد الحالي.')) return;
        const result = await callAPI('adminApproveGmail', { rowIndex });
        if (result?.success) {
            alert('✅ تم القبول وتحويل الرصيد');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function rejectGmail(rowIndex, blockUser) {
        if (!confirm(blockUser ? '⚠️ رفض الجميل وحظر المستخدم؟' : '❌ رفض هذا الجميل؟')) return;
        const result = await callAPI('adminRejectGmail', { rowIndex, blockUser: blockUser ? 'true' : 'false' });
        if (result?.success) {
            alert(blockUser ? '✅ تم الرفض والحظر' : '✅ تم الرفض');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function approveWithdrawal(rowIndex) {
        if (!confirm('✅ قبول طلب السحب؟')) return;
        const result = await callAPI('adminApproveWithdrawal', { rowIndex });
        if (result?.success) {
            alert('✅ تم قبول السحب');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function rejectWithdrawal(rowIndex) {
        if (!confirm('❌ رفض طلب السحب؟ سيتم إعادة المبلغ للرصيد.')) return;
        const result = await callAPI('adminRejectWithdrawal', { rowIndex, returnBalance: 'true' });
        if (result?.success) {
            alert('✅ تم الرفض وإعادة المبلغ');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function blockUser(phone) {
        if (!confirm(`⚠️ حظر المستخدم ${phone}؟`)) return;
        const result = await callAPI('adminBlockUser', { phone });
        if (result?.success) {
            alert('✅ تم الحظر');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function unblockUser(phone) {
        if (!confirm(`🔓 إلغاء حظر المستخدم ${phone}؟`)) return;
        const result = await callAPI('adminUnblockUser', { phone });
        if (result?.success) {
            alert('✅ تم إلغاء الحظر');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function modifyBalance() {
        const phone = document.getElementById('balancePhone').value.trim();
        const type = document.getElementById('balanceType').value;
        const amount = parseFloat(document.getElementById('balanceAmount').value);
        const operation = document.getElementById('balanceOperation').value;

        if (!phone || isNaN(amount)) {
            alert('⚠️ أدخل رقم الهاتف والمبلغ');
            return;
        }

        const result = await callAPI('adminModifyBalance', { phone, type, amount, operation });
        if (result?.success) {
            alert(`✅ تم التعديل\nالقديم: ${result.oldValue} ج.م\nالجديد: ${result.newValue} ج.م`);
            refreshAllData();
            document.getElementById('balanceAmount').value = '';
            document.getElementById('balancePhone').value = '';
        } else {
            alert('❌ حدث خطأ');
        }
    }

    function showImage(url) {
        const modal = document.getElementById('imageModal');
        const img = document.getElementById('modalImage');
        img.src = url;
        modal.style.display = 'flex';
    }

    function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    refreshAllData();
</script>
</body>
</html>
