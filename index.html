<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة التحكم الشاملة - Genezis Gmail Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .admin-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* الهيدر */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .admin-header h1 {
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header h1 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 10px;
            border-radius: 20px;
        }

        .refresh-all {
            background: linear-gradient(135deg, #1a73e8, #0d5bba);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,115,232,0.3);
        }

        /* إحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #1a73e8;
        }

        .stat-label {
            color: #555;
            font-size: 13px;
            margin-top: 4px;
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1a73e8, #0d5bba);
            box-shadow: 0 4px 12px rgba(26,115,232,0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.25);
        }

        /* البطاقات */
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header h2 {
            color: #1a73e8;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-refresh:hover {
            background: #0d5bba;
            transform: scale(1.02);
        }

        /* لوحة تحكم الرصيد */
        .balance-control-panel {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .balance-control-panel .form-group {
            flex: 1;
            min-width: 160px;
        }

        .balance-control-panel label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        .balance-control-panel input, .balance-control-panel select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-success {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* الجداول */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 12px 10px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        tr:hover {
            background: #eef2ff;
        }

        /* حالة الطلبات */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .status-approved {
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: white;
        }

        .status-rejected {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .status-completed {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: white;
        }

        /* الصور */
        .gmail-image {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #ddd;
        }

        .gmail-image:hover {
            transform: scale(1.1);
            border-color: #1a73e8;
        }

        /* نافذة عرض الصورة */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .image-modal-content {
            background: white;
            border-radius: 20px;
            padding: 16px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }

        .image-modal-content img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .close-modal-img {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .status-active {
            color: #28a745;
            font-weight: bold;
        }

        .status-blocked {
            color: #dc3545;
            font-weight: bold;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> لوحة التحكم الشاملة</h1>
        <button class="refresh-all" onclick="refreshAllData()"><i class="fas fa-sync-alt"></i> تحديث الكل</button>
    </div>

    <div class="stats-grid" id="statsContainer">
        <div class="stat-card">
            <div class="stat-icon">📧</div>
            <div class="stat-value" id="totalGmails">0</div>
            <div class="stat-label">إجمالي طلبات Gmail</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-value" id="pendingGmails">0</div>
            <div class="stat-label">قيد المراجعة</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="totalWithdrawals">0</div>
            <div class="stat-label">طلبات السحب</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">إجمالي المستخدمين</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('gmails')"><i class="fas fa-envelope"></i> طلبات Gmail</button>
        <button class="tab-btn" onclick="showTab('withdrawals')"><i class="fas fa-money-bill"></i> طلبات السحب</button>
        <button class="tab-btn" onclick="showTab('users')"><i class="fas fa-users"></i> إدارة المستخدمين</button>
        <button class="tab-btn" onclick="showTab('balance')"><i class="fas fa-coins"></i> تعديل الرصيد</button>
    </div>

    <!-- طلبات Gmail -->
    <div id="gmailsTab" class="tab-content active">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-envelope-open-text"></i> طلبات إنشاء Gmail</h2>
                <button class="btn-refresh" onclick="loadAllGmails()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="gmailsTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- طلبات السحب -->
    <div id="withdrawalsTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-money-bill-wave"></i> طلبات السحب</h2>
                <button class="btn-refresh" onclick="loadAllWithdrawals()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="withdrawalsTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- إدارة المستخدمين -->
    <div id="usersTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-user-cog"></i> إدارة المستخدمين</h2>
                <button class="btn-refresh" onclick="loadAllUsers()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="usersTable" class="table-wrapper">
                <div class="loading">⏳ جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- تعديل الرصيد -->
    <div id="balanceTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-coins"></i> تعديل رصيد المستخدم</h2>
            </div>
            <div class="balance-control-panel">
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                    <input type="tel" id="balancePhone" placeholder="مثال: 01012345678">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> نوع الرصيد</label>
                    <select id="balanceType">
                        <option value="current">الرصيد الحالي</option>
                        <option value="pending">الرصيد المتجمد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> المبلغ</label>
                    <input type="number" id="balanceAmount" placeholder="المبلغ">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-exchange-alt"></i> العملية</label>
                    <select id="balanceOperation">
                        <option value="add">➕ إضافة</option>
                        <option value="subtract">➖ خصم</option>
                        <option value="set">⚙️ تعيين</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="modifyBalance()"><i class="fas fa-save"></i> تعديل الرصيد</button>
            </div>
            <button class="btn-refresh" onclick="loadAllUsers()"><i class="fas fa-sync-alt"></i> تحديث قائمة المستخدمين</button>
            <div id="usersBalanceTable" class="table-wrapper">
                <div class="loading">⏳ اضغط على زر التحديث لعرض المستخدمين</div>
            </div>
        </div>
    </div>
</div>

<!-- نافذة عرض الصورة -->
<div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <div class="image-modal-content" onclick="event.stopPropagation()">
        <span class="close-modal-img" onclick="closeImageModal()">&times;</span>
        <img id="modalImage" src="" alt="صورة الجميل">
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhqm0X3ZotU1CTxYyPDWgESbQPJuCvcs4MkGjgyPNXB4M7pUot_L1DsIk6bAF8lQHv/exec';
    const TELEGRAM_BOT_TOKEN = '8683585634:AAEzjHOyOouQemsaT9HNlgq2W7d68uNO41k';
    const TELEGRAM_CHAT_ID = '7526387894';

    let gmailsData = [];
    let withdrawalsData = [];
    let usersData = [];

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        event.target.classList.add('active');
    }

    async function callAPI(action, params = {}) {
        try {
            const url = new URL(SCRIPT_URL);
            url.searchParams.append('action', action);
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
            const response = await fetch(url.toString());
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: error.message };
        }
    }

    async function refreshAllData() {
        await loadAllGmails();
        await loadAllWithdrawals();
        await loadAllUsers();
        updateStats();
    }

    function updateStats() {
        document.getElementById('totalGmails').textContent = gmailsData.length || 0;
        document.getElementById('pendingGmails').textContent = gmailsData.filter(g => g.status === 'Pending').length || 0;
        document.getElementById('totalWithdrawals').textContent = withdrawalsData.filter(w => w.status === 'Pending').length || 0;
        document.getElementById('totalUsers').textContent = usersData.length || 0;
    }

    async function getTelegramImageUrl(gmail) {
        try {
            // محاولة جلب الصورة من تليجرام بناءً على البريد
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates`);
            const data = await response.json();
            if (data.ok && data.result) {
                for (const update of data.result) {
                    if (update.message && update.message.photo && update.message.caption) {
                        if (update.message.caption.includes(gmail)) {
                            const photo = update.message.photo[update.message.photo.length - 1];
                            const fileId = photo.file_id;
                            const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getFile?file_id=${fileId}`);
                            const fileData = await fileResponse.json();
                            if (fileData.ok) {
                                return `https://api.telegram.org/file/bot${TELEGRAM_BOT_TOKEN}/${fileData.result.file_path}`;
                            }
                        }
                    }
                }
            }
        } catch (e) {
            console.error('Telegram fetch error:', e);
        }
        return '';
    }

    async function loadAllGmails() {
        const container = document.getElementById('gmailsTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
        
        const result = await callAPI('adminGetAllGmails');
        
        if (result?.success && result.gmails) {
            gmailsData = result.gmails;
            if (gmailsData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا توجد طلبات إنشاء Gmail</div>';
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th><th>📷 الصورة</th><th>📱 رقم الهاتف</th><th>👤 الاسم</th><th>📧 البريد</th><th>🔑 كلمة المرور</th><th>📅 التاريخ</th><th>📌 الحالة</th><th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
            
            for (let idx = 0; idx < gmailsData.length; idx++) {
                const g = gmailsData[idx];
                const statusClass = g.status === 'Pending' ? 'status-pending' : (g.status === 'Approved' ? 'status-approved' : 'status-rejected');
                const statusText = g.status === 'Pending' ? '⏳ قيد المراجعة' : (g.status === 'Approved' ? '✅ مقبول' : '❌ مرفوض');
                
                let imgHtml = '📷 لا توجد';
                let imageUrl = '';
                
                if (g.imageUrl && g.imageUrl.startsWith('http')) {
                    imageUrl = g.imageUrl;
                    imgHtml = `<img src="${imageUrl}" class="gmail-image" onclick="showImage('${imageUrl}')" onerror="this.src='https://via.placeholder.com/50?text=خطأ'">`;
                } else {
                    const telegramUrl = await getTelegramImageUrl(g.gmail);
                    if (telegramUrl) {
                        imageUrl = telegramUrl;
                        imgHtml = `<img src="${telegramUrl}" class="gmail-image" onclick="showImage('${telegramUrl}')" onerror="this.src='https://via.placeholder.com/50?text=خطأ'">`;
                    }
                }
                
                html += `<tr>
                    <td>${idx + 1}${'</td>'}
                    <td>${imgHtml}${'</td>'}
                    <td>${g.phone}${'</td>'}
                    <td>${g.fullName}${'</td>'}
                    <td>${g.gmail}${'</td>'}
                    <td>${g.password}${'</td>'}
                    <td>${new Date(g.timestamp).toLocaleDateString('ar-EG')}${'</td>'}
                    <td><span class="status-badge ${statusClass}">${statusText}</span>${'</td>'}
                    <td>
                        ${g.status === 'Pending' ? `
                            <button class="btn-success" onclick="approveGmail(${g.rowIndex})">✅ قبول</button>
                            <button class="btn-danger" onclick="rejectGmail(${g.rowIndex}, false)">❌ رفض</button>
                            <button class="btn-warning" onclick="rejectGmail(${g.rowIndex}, true)">🚫 رفض وحظر</button>
                        ` : ''}
                    ${'</td>'}
                 ${'</tr>'}`;
            }
            html += `</tbody>点心`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ في تحميل البيانات</div>';
        }
        updateStats();
    }

    async function loadAllWithdrawals() {
        const container = document.getElementById('withdrawalsTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
        
        const result = await callAPI('adminGetAllWithdrawals');
        
        if (result?.success && result.withdrawals) {
            withdrawalsData = result.withdrawals;
            if (withdrawalsData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا توجد طلبات سحب</div>';
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th><th>📱 رقم الهاتف</th><th>🏦 المحفظة</th><th>💰 المبلغ</th><th>💸 المصاريف</th><th>✅ الصافي</th><th>📅 التاريخ</th><th>📌 الحالة</th><th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
            
            withdrawalsData.forEach((w, idx) => {
                const statusClass = w.status === 'Pending' ? 'status-pending' : (w.status === 'Completed' ? 'status-completed' : 'status-rejected');
                const statusText = w.status === 'Pending' ? '⏳ قيد المراجعة' : (w.status === 'Completed' ? '✅ مكتمل' : '❌ مرفوض');
                const netAmount = w.amount - (w.fee || 5);
                
                html += `<tr>
                    <td>${idx + 1}${'</td>'}
                    <td>${w.phone}${'</td>'}
                    <td>${w.wallet}${'</td>'}
                    <td>${w.amount} ج.م${'</td>'}
                    <td>${w.fee || 5} ج.م${'</td>'}
                    <td>${netAmount} ج.م${'</td>'}
                    <td>${new Date(w.timestamp).toLocaleDateString('ar-EG')}${'</td>'}
                    <td><span class="status-badge ${statusClass}">${statusText}</span>${'</td>'}
                    <td>
                        ${w.status === 'Pending' ? `
                            <button class="btn-success" onclick="approveWithdrawal(${w.rowIndex})">✅ قبول</button>
                            <button class="btn-danger" onclick="rejectWithdrawal(${w.rowIndex})">❌ رفض</button>
                        ` : ''}
                    ${'</td>'}
                 ${'</tr>'}`;
            });
            html += `</tbody>点心`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ في تحميل البيانات</div>';
        }
        updateStats();
    }

    async function loadAllUsers() {
        const container = document.getElementById('usersTable');
        const balanceContainer = document.getElementById('usersBalanceTable');
        container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
        balanceContainer.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
        
        const result = await callAPI('adminGetAllUsers');
        
        if (result?.success && result.users) {
            usersData = result.users;
            if (usersData.length === 0) {
                container.innerHTML = '<div class="no-data">📭 لا يوجد مستخدمين</div>';
                balanceContainer.innerHTML = '<div class="no-data">📭 لا يوجد مستخدمين</div>';
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th><th>📱 رقم الهاتف</th><th>👤 الاسم</th><th>💰 الرصيد الحالي</th><th>⏳ الرصيد المتجمد</th><th>📌 الحالة</th><th>⚡ إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
            
            let balanceHtml = `</table>
                <thead>
                    <tr>
                        <th>#</th><th>📱 رقم الهاتف</th><th>👤 الاسم</th><th>💰 الرصيد الحالي</th><th>⏳ الرصيد المتجمد</th><th>📌 الحالة</th>
                    </tr>
                </thead>
                <tbody>`;
            
            usersData.forEach((u, idx) => {
                const statusText = u.blocked === "TRUE" ? '🔴 محظور' : '🟢 نشط';
                const statusClass = u.blocked === "TRUE" ? 'status-blocked' : 'status-active';
                
                html += `<tr>
                    <td>${idx + 1}${'</td>'}
                    <td>${u.phone}${'</td>'}
                    <td>${u.name}${'</td>'}
                    <td>${u.balance} ج.م${'</td>'}
                    <td>${u.pendingBalance} ج.م${'</td>'}
                    <td><span class="${statusClass}">${statusText}</span>${'</td>'}
                    <td>
                        ${u.blocked === "TRUE" ? 
                            `<button class="btn-success" onclick="unblockUser('${u.phone}')">🔓 إلغاء الحظر</button>` : 
                            `<button class="btn-danger" onclick="blockUser('${u.phone}')">🔒 حظر</button>`
                        }
                    ${'</td>'}
                 ${'</tr>'}`;
                
                balanceHtml += `<tr>
                    <td>${idx + 1}${'</td>'}
                    <td>${u.phone}${'</td>'}
                    <td>${u.name}${'</td>'}
                    <td>${u.balance} ج.م${'</td>'}
                    <td>${u.pendingBalance} ج.م${'</td>'}
                    <td><span class="${statusClass}">${statusText}</span>${'</td>'}
                 ${'</tr>'}`;
            });
            html += `</tbody>点心`;
            balanceHtml += `</tbody>点心`;
            container.innerHTML = html;
            balanceContainer.innerHTML = balanceHtml;
        } else {
            container.innerHTML = '<div class="no-data">❌ حدث خطأ</div>';
            balanceContainer.innerHTML = '<div class="no-data">❌ حدث خطأ</div>';
        }
        updateStats();
    }

    async function approveGmail(rowIndex) {
        if (!confirm('✅ قبول هذا الجميل؟ سيتم تحويل المبلغ للرصيد الحالي.')) return;
        const result = await callAPI('adminApproveGmail', { rowIndex });
        if (result?.success) {
            alert('✅ تم القبول وتحويل الرصيد');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function rejectGmail(rowIndex, blockUser) {
        if (!confirm(blockUser ? '⚠️ رفض الجميل وحظر المستخدم؟' : '❌ رفض هذا الجميل؟')) return;
        const result = await callAPI('adminRejectGmail', { rowIndex, blockUser: blockUser ? 'true' : 'false' });
        if (result?.success) {
            alert(blockUser ? '✅ تم الرفض والحظر' : '✅ تم الرفض');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function approveWithdrawal(rowIndex) {
        if (!confirm('✅ قبول طلب السحب؟')) return;
        const result = await callAPI('adminApproveWithdrawal', { rowIndex });
        if (result?.success) {
            alert('✅ تم قبول السحب');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function rejectWithdrawal(rowIndex) {
        if (!confirm('❌ رفض طلب السحب؟ سيتم إعادة المبلغ للرصيد.')) return;
        const result = await callAPI('adminRejectWithdrawal', { rowIndex, returnBalance: 'true' });
        if (result?.success) {
            alert('✅ تم الرفض وإعادة المبلغ');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function blockUser(phone) {
        if (!confirm(`⚠️ حظر المستخدم ${phone}؟`)) return;
        const result = await callAPI('adminBlockUser', { phone });
        if (result?.success) {
            alert('✅ تم الحظر');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function unblockUser(phone) {
        if (!confirm(`🔓 إلغاء حظر المستخدم ${phone}؟`)) return;
        const result = await callAPI('adminUnblockUser', { phone });
        if (result?.success) {
            alert('✅ تم إلغاء الحظر');
            refreshAllData();
        } else {
            alert('❌ حدث خطأ');
        }
    }

    async function modifyBalance() {
        const phone = document.getElementById('balancePhone').value.trim();
        const type = document.getElementById('balanceType').value;
        const amount = parseFloat(document.getElementById('balanceAmount').value);
        const operation = document.getElementById('balanceOperation').value;
        
        if (!phone || isNaN(amount)) {
            alert('⚠️ أدخل رقم الهاتف والمبلغ');
            return;
        }
        
        const result = await callAPI('adminModifyBalance', { phone, type, amount, operation });
        if (result?.success) {
            alert(`✅ تم التعديل\nالقديم: ${result.oldValue} ج.م\nالجديد: ${result.newValue} ج.م`);
            refreshAllData();
            document.getElementById('balanceAmount').value = '';
            document.getElementById('balancePhone').value = '';
        } else {
            alert('❌ حدث خطأ');
        }
    }

    function showImage(url) {
        const modal = document.getElementById('imageModal');
        const img = document.getElementById('modalImage');
        img.src = url;
        modal.style.display = 'flex';
    }

    function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    refreshAllData();
</script>
</body>
</html>
